# Chạy toàn bộ app + Postgres bằng Docker.
#   docker compose up -d --build
# Cấu hình DB qua biến môi trường (đặt trong file .env cùng thư mục, hoặc dùng mặc định).

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-finance}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-finance}
      POSTGRES_DB: ${POSTGRES_DB:-finance}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-finance} -d ${POSTGRES_DB:-finance}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Chạy migration + seed một lần rồi thoát (dùng image builder có sẵn Prisma CLI).
  migrate:
    build:
      context: .
      target: builder
    command: sh -c "npx prisma migrate deploy && npx prisma db seed"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-finance}:${POSTGRES_PASSWORD:-finance}@db:5432/${POSTGRES_DB:-finance}?schema=finance
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  web:
    build:
      context: .
      target: runner
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-finance}:${POSTGRES_PASSWORD:-finance}@db:5432/${POSTGRES_DB:-finance}?schema=finance
      NODE_ENV: production
      # Auth (tuỳ chọn): đặt AUTH_PASSWORD trong .env để bật đăng nhập.
      AUTH_PASSWORD: ${AUTH_PASSWORD:-}
      AUTH_SECRET: ${AUTH_SECRET:-}
      CRON_SECRET: ${CRON_SECRET:-}
      # Email nhắc nhở (tuỳ chọn) — đặt SMTP_* trong .env để bật.
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_SECURE: ${SMTP_SECURE:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  # Gọi định kỳ các endpoint của web (cập nhật giá, recurring, snapshot Net Worth).
  cron:
    image: alpine:3.20
    restart: unless-stopped
    environment:
      CRON_SECRET: ${CRON_SECRET:-}
    volumes:
      - ./docker/cron.sh:/cron.sh:ro
    entrypoint: ["/bin/sh", "-c", "apk add --no-cache curl >/dev/null && exec sh /cron.sh"]
    depends_on:
      - web

volumes:
  pgdata:
